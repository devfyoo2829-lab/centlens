<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 920" role="img">
<title>CentLens LangGraph 노드 다이어그램</title>
<desc>10개 노드로 구성된 멀티에이전트 시스템. 전처리 후 6축 Judge 노드가 병렬 실행되고, 교차 채점·등급 산출·임베딩을 거쳐 저장됩니다.</desc>
<style>
.t { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size: 14px; font-weight: 400; }
.ts { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size: 12px; font-weight: 400; fill: #666; }
.th { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-size: 14px; font-weight: 500; }
.c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
.c-blue text { fill: #0C447C; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-purple text { fill: #3C3489; }
.c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal text { fill: #085041; }
.c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
.c-amber text { fill: #633806; }
.c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray text { fill: #2C2C2A; }
.arr { stroke: #444; stroke-width: 1.5; fill: none; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- START -->
<g class="c-gray">
<rect x="280" y="30" width="120" height="44" rx="22" stroke-width="0.5"/>
<text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">START</text>
</g>
<line x1="340" y1="74" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

<!-- ① Preprocessor -->
<g class="c-blue">
<rect x="220" y="100" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="120" text-anchor="middle" dominant-baseline="central">① Preprocessor</text>
<text class="ts" x="340" y="140" text-anchor="middle" dominant-baseline="central">ffmpeg 프레임 + Whisper STT</text>
</g>

<!-- 분기 라인: Preprocessor → 6개 Judge -->
<line x1="340" y1="156" x2="340" y2="190" stroke="#999" stroke-width="0.5"/>
<line x1="160" y1="190" x2="520" y2="190" stroke="#999" stroke-width="0.5"/>

<!-- 변화 3축 그룹 라벨 -->
<text class="ts" x="40" y="215" text-anchor="start" font-style="italic">변화 3축 (병렬)</text>

<!-- ② Movement Judge -->
<g class="c-purple">
<rect x="80" y="230" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="160" y="250" text-anchor="middle" dominant-baseline="central">② Movement</text>
<text class="ts" x="160" y="270" text-anchor="middle" dominant-baseline="central">움직임 축</text>
</g>
<line x1="160" y1="190" x2="160" y2="230" class="arr" marker-end="url(#arrow)"/>

<!-- ③ Growth Judge -->
<g class="c-purple">
<rect x="260" y="230" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="250" text-anchor="middle" dominant-baseline="central">③ Growth</text>
<text class="ts" x="340" y="270" text-anchor="middle" dominant-baseline="central">성장 축</text>
</g>
<line x1="340" y1="190" x2="340" y2="230" class="arr" marker-end="url(#arrow)"/>

<!-- ④ Expansion Judge -->
<g class="c-purple">
<rect x="440" y="230" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="250" text-anchor="middle" dominant-baseline="central">④ Expansion</text>
<text class="ts" x="520" y="270" text-anchor="middle" dominant-baseline="central">확장 축</text>
</g>
<line x1="520" y1="190" x2="520" y2="230" class="arr" marker-end="url(#arrow)"/>

<!-- 연출 3축 그룹 라벨 -->
<text class="ts" x="40" y="320" text-anchor="start" font-style="italic">연출 3축 (병렬)</text>

<!-- ⑤ Camera Judge -->
<g class="c-teal">
<rect x="80" y="335" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="160" y="355" text-anchor="middle" dominant-baseline="central">⑤ Camera</text>
<text class="ts" x="160" y="375" text-anchor="middle" dominant-baseline="central">카메라 축</text>
</g>
<line x1="160" y1="286" x2="160" y2="335" class="arr" marker-end="url(#arrow)"/>

<!-- ⑥ Color Judge -->
<g class="c-teal">
<rect x="260" y="335" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="355" text-anchor="middle" dominant-baseline="central">⑥ Color</text>
<text class="ts" x="340" y="375" text-anchor="middle" dominant-baseline="central">컬러 축</text>
</g>
<line x1="340" y1="286" x2="340" y2="335" class="arr" marker-end="url(#arrow)"/>

<!-- ⑦ Sound Judge -->
<g class="c-teal">
<rect x="440" y="335" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="355" text-anchor="middle" dominant-baseline="central">⑦ Sound</text>
<text class="ts" x="520" y="375" text-anchor="middle" dominant-baseline="central">사운드 축</text>
</g>
<line x1="520" y1="286" x2="520" y2="335" class="arr" marker-end="url(#arrow)"/>

<!-- 합류 라인: 6개 Judge → Cross-Check -->
<line x1="160" y1="391" x2="160" y2="420" stroke="#999" stroke-width="0.5"/>
<line x1="340" y1="391" x2="340" y2="420" stroke="#999" stroke-width="0.5"/>
<line x1="520" y1="391" x2="520" y2="420" stroke="#999" stroke-width="0.5"/>
<line x1="160" y1="420" x2="520" y2="420" stroke="#999" stroke-width="0.5"/>
<line x1="340" y1="420" x2="340" y2="450" class="arr" marker-end="url(#arrow)"/>

<!-- ⑧ Cross-Check -->
<g class="c-amber">
<rect x="220" y="450" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="470" text-anchor="middle" dominant-baseline="central">⑧ Cross-Check</text>
<text class="ts" x="340" y="490" text-anchor="middle" dominant-baseline="central">A/B 교차 채점, 편향 제거</text>
</g>
<line x1="340" y1="506" x2="340" y2="540" class="arr" marker-end="url(#arrow)"/>

<!-- ⑨ Grade Calculator -->
<g class="c-gray">
<rect x="220" y="540" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="560" text-anchor="middle" dominant-baseline="central">⑨ Grade Calculator</text>
<text class="ts" x="340" y="580" text-anchor="middle" dominant-baseline="central">weakest-link 등급 산출</text>
</g>
<line x1="340" y1="596" x2="340" y2="630" class="arr" marker-end="url(#arrow)"/>

<!-- ⑩ Embedder -->
<g class="c-gray">
<rect x="220" y="630" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="650" text-anchor="middle" dominant-baseline="central">⑩ Embedder</text>
<text class="ts" x="340" y="670" text-anchor="middle" dominant-baseline="central">시맨틱 검색용 임베딩</text>
</g>
<line x1="340" y1="686" x2="340" y2="720" class="arr" marker-end="url(#arrow)"/>

<!-- END -->
<g class="c-gray">
<rect x="240" y="720" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="740" text-anchor="middle" dominant-baseline="central">END</text>
<text class="ts" x="340" y="760" text-anchor="middle" dominant-baseline="central">Supabase 저장</text>
</g>

<!-- 범례 -->
<text class="th" x="40" y="820" text-anchor="start">범례</text>
<rect x="40" y="835" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="62" y="847" dominant-baseline="central">전처리</text>
<rect x="120" y="835" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="142" y="847" dominant-baseline="central">변화 축 평가</text>
<rect x="240" y="835" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="262" y="847" dominant-baseline="central">연출 축 평가</text>
<rect x="360" y="835" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="382" y="847" dominant-baseline="central">교차 검증</text>
<rect x="460" y="835" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="482" y="847" dominant-baseline="central">계산/저장</text>

<text class="ts" x="40" y="880" text-anchor="start">LLM 호출: ②~⑧ (총 7회). 처리 시간 단축 핵심: ②~⑦ 병렬 실행.</text>
</svg>
